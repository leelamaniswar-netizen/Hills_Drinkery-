<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Hill's Drinkery - FIFA 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:#0a0a0a;font-family:'Montserrat',sans-serif;color:#fff}
#overlay{position:fixed;inset:0;z-index:100;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;}
#overlay img{width:900px;filter:brightness(0) invert(1);}
#osub{margin-top:40px;font-size:26px;font-weight:700;letter-spacing:10px;color:#ffffff;text-transform:uppercase;opacity:0;transition:opacity 0.6s ease;}
#main{width:1920px;height:1080px;display:grid;grid-template-columns:460px 1fr;opacity:0;transition:opacity 0.8s ease;}
.left{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 44px;gap:28px;border-right:1px solid #1c1c1c;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(224,112,32,0.1) 0%,transparent 70%);}
.pl{opacity:0;transform:translateY(-10px);transition:opacity 0.7s,transform 0.7s;}
.pl img{width:300px;filter:brightness(0) invert(1);display:block;margin:0 auto;}
#pRule{width:60px;height:1px;background:#222;opacity:0;transition:opacity 0.7s;}
.fb{text-align:center;opacity:0;transform:translateY(-10px);transition:opacity 0.7s,transform 0.7s;}
.fm{font-size:56px;font-weight:900;letter-spacing:2px;color:#fff;text-transform:uppercase;line-height:1;}
.fs{font-size:34px;font-weight:900;letter-spacing:1px;color:#E07020;text-transform:uppercase;line-height:1.1;padding:0 8px;word-wrap:break-word;}
.fe{margin-top:12px;font-size:15px;font-weight:600;letter-spacing:4px;color:#ffffff;text-transform:uppercase;}
#pTrophy{font-size:68px;opacity:0;transition:opacity 0.7s;filter:drop-shadow(0 0 20px rgba(224,112,32,0.5));}
#pPill{display:flex;align-items:center;opacity:0;transition:opacity 0.7s;}
.pla{background:#E07020;color:#0a0a0a;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:10px 24px;border-radius:999px 0 0 999px;}
.plb{background:#181818;border:1px solid #2a2a2a;border-left:none;color:#999;font-size:16px;letter-spacing:2px;padding:10px 24px;border-radius:0 999px 999px 0;}
.right{display:flex;flex-direction:column;justify-content:space-between;padding:44px 64px;}
#pHeader{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid #333;opacity:0;transition:opacity 0.7s;}
.wt{font-size:20px;font-weight:700;letter-spacing:5px;color:#E07020;text-transform:uppercase;}
.wr{font-size:17px;font-weight:400;letter-spacing:2px;color:#aaa;}
#matches{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;padding:12px 0;overflow:hidden;}
.mr{display:grid;grid-template-columns:150px 1fr 80px 1fr 160px;align-items:center;gap:16px;padding:0 32px;border:1px solid #333;border-left:4px solid transparent;background:#161616;opacity:0;transform:translateX(50px);transition:opacity 0.55s,transform 0.55s;flex:1;min-height:0;}
.mr.show{opacity:1;transform:translateX(0);}
.mr.feat{border-left-color:#E07020;background:#1a0e05;}
.mt{text-align:center;}
.tv{font-size:38px;font-weight:900;color:#E07020;line-height:1;}
.ta{font-size:15px;font-weight:700;color:#aaa;letter-spacing:2px;}
.td{font-size:14px;color:#aaa;margin-top:4px;}
.tm{display:flex;align-items:center;gap:16px;}
.tm.aw{flex-direction:row-reverse;text-align:right;}
.tf{font-size:40px;flex-shrink:0;}
.tn{font-size:30px;font-weight:700;color:#ffffff;line-height:1.1;}
.ts{font-size:14px;color:#aaa;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.vs{text-align:center;font-size:20px;font-weight:700;color:#555;letter-spacing:3px;}
.scorebox{text-align:center;}
.scoreval{font-size:30px;font-weight:900;color:#fff;letter-spacing:2px;line-height:1;}
.scorelabel{font-size:9px;font-weight:700;color:#E07020;letter-spacing:2px;margin-top:4px;}
.mr.done{opacity:0.75;}
.mr.done.show{opacity:0.75;}
.done-tag{background:#3a3a3a;color:#ccc;}
.mb{text-align:right;}
.ft{display:inline-block;background:#E07020;color:#0a0a0a;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:999px;}
#pFooter{display:flex;align-items:center;justify-content:space-between;border-top:1px solid #333;padding-top:16px;opacity:0;transition:opacity 0.7s;}
.fc{font-size:22px;font-weight:300;color:#ccc;letter-spacing:1px;}
.fc strong{font-weight:700;color:#fff;}
.fl{display:flex;align-items:center;gap:10px;font-size:15px;color:#aaa;letter-spacing:2px;}
.dot{width:9px;height:9px;border-radius:50%;background:#E07020;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* OUTRO — logo grows from left panel to centre */
#outroLogo{
  position:fixed;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.6s ease;
}
#outroLogo img{
  filter:brightness(0) invert(1);
  display:block;
}
</style>
</head>

const W=ms=>new Promise(r=>setTimeout(r,ms));
function bounds(){
  const n=new Date(),dy=n.getDay();
  const m=new Date(n);m.setDate(n.getDate()-(dy===0?6:dy-1));m.setHours(0,0,0,0);
  const s=new Date(m);s.setDate(m.getDate()+6);s.setHours(23,59,59,999);
  return{m,s};
}
function fDay(ds){return new Date(ds+"T12:00:00").toLocaleDateString("de-DE",{weekday:"short",month:"short",day:"numeric"});}
function fTime(t){const[h,m]=t.split(":").map(Number);return{v:`${h>12?h-12:h}:${m<10?"0":""}${m}`,a:h>=12?"PM":"AM"};}
function dow(ds){return new Date(ds+"T12:00:00").getDay();}
function getWeekMatches(){
  const{m,s}=bounds();
  const wk=FX.filter(f=>{const d=new Date(f.d+"T12:00:00");return d>=m&&d<=s;});
  // already sorted chronologically in FX, but re-sort defensively by date+time
  wk.sort((a,b)=>{
    const da=new Date(a.d+"T"+a.t+":00");
    const db=new Date(b.d+"T"+b.t+":00");
    return da-db;
  });
  return wk;
}
function setRange(){
  const{m,s}=bounds();
  document.getElementById("wRange").textContent=
    m.toLocaleDateString("de-DE",{month:"short",day:"numeric"})+" – "+
    s.toLocaleDateString("de-DE",{month:"short",day:"numeric",year:"numeric"});
}
function buildRows(mx){
  const c=document.getElementById("matches");c.innerHTML="";
  if(!mx.length){c.innerHTML="<div style='flex:1;display:flex;align-items:center;justify-content:center;color:#444;font-size:20px;letter-spacing:3px'>Keine Abendspiele in dieser Woche</div>";return;}
  mx.forEach((f,i)=>{
    const{v,a}=fTime(f.t);const feat=BIG.some(t=>f.h.includes(t)||f.a.includes(t));
    const finished = f.sc && f.sc.length>0;
    const r=document.createElement("div");r.className="mr"+(feat?" feat":"")+(finished?" done":"");
    const centerHTML = finished
      ? `<div class="scorebox"><div class="scoreval">${f.sc}</div><div class="scorelabel">ENDSTAND</div></div>`
      : `<div class="vs">VS</div>`;
    r.innerHTML=`<div class="mt"><div class="tv">${v}</div><div class="ta">${a} MESZ</div><div class="td">${fDay(f.d)}</div></div>`+
      `<div class="tm"><div class="tf">${f.hf}</div><div><div class="tn">${f.h}</div><div class="ts">${f.s}</div></div></div>`+
      centerHTML+
      `<div class="tm aw"><div class="tf">${f.af}</div><div><div class="tn">${f.a}</div><div class="ts">&nbsp;</div></div></div>`+
      `<div class="mb">${finished?'<span class="ft done-tag">Beendet</span>':(feat?'<span class="ft">&#128293; Top-Spiel</span>':"")}</div>`;
    c.appendChild(r);setTimeout(()=>r.classList.add("show"),100+i*220);
  });
}
function fo(el,d=700){el.style.transition=`opacity ${d}ms ease`;el.style.opacity="0";}
function fi(el,d=700){el.style.transition=`opacity ${d}ms ease`;el.style.opacity="1";}

  const PAGE_SIZE=5;
  const pages=[];
  for(let i=0;i<weekMatches.length;i+=PAGE_SIZE){pages.push(weekMatches.slice(i,i+PAGE_SIZE));}
  if(!pages.length)pages.push([]);

      }
      buildRows(pages[p]);

    // MAIN OUT

    // Step 1: capture position of small panel logo BEFORE fading anything out
    const pLogoEl = document.getElementById("pLogo");

    const outroEl = document.getElementById("outroLogo");
    const outroImg = document.getElementById("outroImg");

    // Position the outro logo exactly over the panel logo (still invisible)
    outroEl.style.transition = "none";
    outroEl.style.left = rect.left + "px";
    outroEl.style.top = rect.top + "px";
    outroEl.style.width = rect.width + "px";
    outroImg.style.width = "100%";

    // Step 2: show outro logo clone, THEN fade out the main screen underneath it
    outroEl.style.opacity = "1";
    fo(mn,700);
    await W(800);
    PE.forEach(({id})=>{
      const el=document.getElementById(id);el.style.opacity="0";
      if(el.classList.contains("pl")||el.classList.contains("fb"))el.style.transform="translateY(-10px)";
    });
    document.getElementById("pTrophy").style.animation="none";

    // Step 3: animate logo to centre full size
    outroEl.style.transition = "left 1.0s cubic-bezier(0.4,0,0.2,1), top 1.0s cubic-bezier(0.4,0,0.2,1), width 1.0s cubic-bezier(0.4,0,0.2,1)";
    const finalW = 900;
    const finalL = (1920 - finalW) / 2;
    const finalT = (1080 - (finalW / (rect.width / rect.height))) / 2;
    outroEl.style.width = finalW + "px";
    outroEl.style.left = finalL + "px";
    outroEl.style.top = finalT + "px";
    await W(1200);

    // Step 4: hold, show subtext
    sub.style.opacity = "1";
    ov.style.opacity = "0";
    await W(3000);

    // Step 5: fade to black — fade outro logo and subtext together
    sub.style.opacity = "0";
    outroEl.style.transition = "opacity 1s ease";
    outroEl.style.opacity = "0";
    await W(1200);
    outroEl.style.left = "0"; outroEl.style.top = "0"; outroEl.style.width = "0";
  }
}
run();
</script>
